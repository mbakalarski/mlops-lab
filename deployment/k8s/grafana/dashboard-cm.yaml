apiVersion: v1
data:
  ml-model-api.json: "{\n  \"title\": \"ML Model API\",\n  \"schemaVersion\": 42,\n  \"version\": 1,\n  \"timezone\": \"browser\",\n  \"refresh\": \"10s\",\n\n  \"time\": {\n    \"from\": \"now-3h\",\n    \"to\": \"now\"\n  },\n\n  \"panels\": [\n    {\n      \"title\": \"Request Rate (Total per Endpoint)\",\n      \"type\": \"timeseries\",\n\n      \"targets\": [\n        {\n          \"expr\": \"sum(rate(http_requests_total[1m])) by (handler)\",\n          \"refId\": \"A\"\n        }\n      ],\n\n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 0\n      }\n    },\n    {\n      \"title\": \"Latency (95th Percentile)\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler))\",\n          \"refId\": \"A\"\n        }\n      ],\n    \n      \"unit\": \"s\",\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 0\n      }\n    }\n  ]\n}\n"
kind: ConfigMap
metadata:
  name: ml-model-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
