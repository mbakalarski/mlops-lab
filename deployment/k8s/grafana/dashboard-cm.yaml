apiVersion: v1
data:
  ml-model-api.json: "{\n  \"title\": \"ML Model API\",\n  \"schemaVersion\": 42,\n  \"version\": 1,\n  \"timezone\": \"browser\",\n  \"refresh\": \"10s\",\n\n  \"time\": {\n    \"from\": \"now-3h\",\n    \"to\": \"now\"\n  },\n\n  \"panels\": [\n    {\n      \"title\": \"Request Rate (Total per Endpoint)\",\n      \"type\": \"timeseries\",\n\n      \"targets\": [\n        {\n          \"expr\": \"sum(rate(http_requests_total[1m])) by (handler)\",\n          \"refId\": \"A\"\n        }\n      ],\n\n      \"unit\": \"req/s\",\n\n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 0\n      }\n    },\n    {\n      \"title\": \"Latency (95th Percentile)\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, handler))\",\n          \"refId\": \"A\"\n        }\n      ],\n    \n      \"unit\": \"s\",\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 0\n      }\n    },\n    {\n      \"title\": \"Error Rate (4xx/5xx Responses)\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(rate(http_requests_total{status=~\\\"4..|5..\\\"}[1m])) by (handler)\"\n        }\n      ],\n\n      \"unit\": \"req/s\",\n\n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 18\n      }\n    },\n    {\n      \"type\": \"text\",\n      \"title\": \"\",\n      \"options\": {\n        \"content\": \"\",\n        \"mode\": \"markdown\"\n      },\n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 18\n      }\n    },\n    {\n      \"title\": \"Incoming Traffic (Bytes/sec)\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(rate(http_request_size_bytes_sum[5m])) by (handler)\"\n        }\n      ],\n    \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"Bps\"\n        }\n      },\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 27\n      }\n    },\n    {\n      \"title\": \"Average Request Size\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(rate(http_request_size_bytes_sum[5m])) by (handler) / sum(rate(http_request_size_bytes_count[5m])) by (handler)\"\n        }\n      ],\n    \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\"\n        }\n      },\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 27\n      }\n    },\n    {\n      \"title\": \"Outgoing Traffic (Bytes/sec)\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(rate(http_response_size_bytes_sum[5m])) by (handler)\"\n        }\n      ],\n    \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"Bps\"\n        }\n      },\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 36\n      }\n    },\n    {\n      \"title\": \"Average Response Size\",\n      \"type\": \"timeseries\",\n    \n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"expr\": \"sum(rate(http_response_size_bytes_sum[5m])) by (handler) / sum(rate(http_response_size_bytes_count[5m])) by (handler)\"\n        }\n      ],\n    \n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\"\n        }\n      },\n    \n      \"gridPos\": {\n        \"h\": 9,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 36\n      }\n    }\n  ]\n}\n"
kind: ConfigMap
metadata:
  name: ml-model-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
