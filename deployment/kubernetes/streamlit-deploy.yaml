apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: streamlit
  name: streamlit
spec:
  replicas: 3
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
      - image: ghcr.io/mbakalarski/mlops-bootcamp-house-price-predictor-streamlit:latest
        name: streamlit
