name: MLOps Pipeline

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      jobs:
        type: choice
        description: 'Select which jobs to run'
        required: false
        default: 'all'
        options:
          - all
          - data_processing
          - model_training
          - build_and_publish
          - streamlit-app

jobs:
  data_processing:
    if: >
        inputs.jobs == 'all' ||
        inputs.jobs == 'data_processing' ||
        inputs.jobs == 'model_training' ||
        inputs.jobs == 'build_and_publish'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.15'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process Data
        run: |
          python src/data/run_processing.py \
            --input data/raw/house_data.csv \
            --output data/processed/cleaned_house_data.csv
      
      - name: Engineer Features
        run: |
          python src/features/engineer.py \
            --input data/processed/cleaned_house_data.csv \
            --output data/processed/featured_house_data.csv \
            --preprocessor models/trained/preprocessor.pkl
      
      - name: Upload Processed Data
        uses: actions/upload-artifact@v7
        with:
          name: processed-data
          path: data/processed/featured_house_data.csv

      - name: Upload Preprocessor
        uses: actions/upload-artifact@v7
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl

  model_training:
    if: >
      inputs.jobs == 'all' ||
      inputs.jobs == 'model_training' ||
      inputs.jobs == 'build_and_publish'
    needs: data_processing

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.15'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Processed Data
        uses: actions/download-artifact@v8
        with:
          name: processed-data
          path: data/processed/

      - name: Set up MLflow Tracking Server
        run: |
          docker pull ghcr.io/mlflow/mlflow:latest
          docker run -d -p 5555:5000 --name mlflow-tracking-server \
            ghcr.io/mlflow/mlflow:latest \
            mlflow server --host 0.0.0.0 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root /tmp/mlruns \
            --disable-security-middleware

      - name: Wait for MLflow Tracking Server to be ready
        run: |
          echo "Waiting for MLflow Tracking Server to be ready..."
          while ! curl -s http://localhost:5555/health | grep -q "OK"; do
            sleep 5
          done
          echo "MLflow Tracking Server is ready!"
      
      - name: Train the Model
        run: |
          python src/models/train_model.py \
            --config configs/model_config.yaml \
            --data data/processed/featured_house_data.csv \
            --models-dir models \
            --mlflow-tracking-uri http://localhost:5555

      - name: Upload Trained Model
        uses: actions/upload-artifact@v7
        with:
          name: trained-model
          path: models/trained/

      - name: Cleaning up MLflow Tracking Server
        run: |
          docker stop mlflow-tracking-server || true
          docker rm mlflow-tracking-server || true

  build_and_publish:
    if: >
      inputs.jobs == 'all' ||
      inputs.jobs == 'build_and_publish'
    needs: model_training

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Trained Model
        uses: actions/download-artifact@v8
        with:
          name: trained-model
          path: models/trained/

      - name: Download Preprocessor
        uses: actions/download-artifact@v8
        with:
          name: preprocessor
          path: models/trained/

      - name: Build and test Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${COMMIT_HASH} .
          docker run -d -p 8000:8000 --name ml-api ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${COMMIT_HASH}
          for i in {1..10}; do
            curl -f http://localhost:8000/health && break || sleep 5;
          done
          docker logs ml-api

      - name: Clean up Test container
        run: |
          docker stop ml-api || true
          docker rm ml-api || true
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GitHub Container Registry
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker tag ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${COMMIT_HASH} \
            ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest
          docker push ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${COMMIT_HASH}
          docker push ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:latest

  streamlit-app:
    if: inputs.jobs == 'all' || inputs.jobs == 'streamlit-app'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.15'

      - name: Install dependencies
        run: |
          cd streamlit_app
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and Push Streamlit Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./streamlit_app
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:streamlit-latest
            ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:streamlit-${{ github.sha }}
